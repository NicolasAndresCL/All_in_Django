[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py
addopts = -q
# Tests async de la UI NiceGUI (nicegui.testing User); no afecta a los tests síncronos.
asyncio_mode = auto
# El plugin de NiceGUI ejecuta este main por test (runpy, simulación sin servidor).
main_file = nicegui_ui/main.py
filterwarnings =
    ignore::DeprecationWarning
