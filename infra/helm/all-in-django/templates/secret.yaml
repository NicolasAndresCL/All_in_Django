apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aid.fullname" . }}-secret
  labels:
    {{- include "aid.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ required "secret.secretKey es obligatorio (--set secret.secretKey=...)" .Values.secret.secretKey | quote }}
  DATABASE_URL: {{ include "aid.databaseUrl" . | quote }}
