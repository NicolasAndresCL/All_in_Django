apiVersion: v1
kind: Service
metadata:
  name: {{ include "aid.fullname" . }}-ui
  labels:
    {{- include "aid.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ui
  ports:
    - port: 8501
      targetPort: 8501
