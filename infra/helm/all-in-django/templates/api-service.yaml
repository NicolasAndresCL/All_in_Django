apiVersion: v1
kind: Service
metadata:
  name: {{ include "aid.fullname" . }}-api
  labels:
    {{- include "aid.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
  ports:
    - port: 8000
      targetPort: 8000
