{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aid.fullname" . }}
  labels:
    {{- include "aid.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # La UI en la raíz; la API (y admin) bajo /api, /admin, /healthz, /static.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "aid.fullname" . }}-ui
                port:
                  number: 8501
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "aid.fullname" . }}-api
                port:
                  number: 8000
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: {{ include "aid.fullname" . }}-api
                port:
                  number: 8000
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: {{ include "aid.fullname" . }}-api
                port:
                  number: 8000
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: {{ include "aid.fullname" . }}-api
                port:
                  number: 8000
{{- end }}
